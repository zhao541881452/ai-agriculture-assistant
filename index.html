<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI农业助手</title>

    <link rel="icon" href="/favicon.ico">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        #chat {
            max-width: 700px;
            margin: auto;
            padding: 10px;
            margin-bottom: 100px;
            padding-bottom: 120px;
        }

        .msg {
            margin: 10px;
            padding: 12px;
            border-radius: 15px;
            max-width: 80%;
            display: inline-block; /* ✅ 关键：长度自适应 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .user {
            background: #007bff;
            color: white;
            float: right;
            clear: both;
        }

        .ai {
            background: white;
            float: left;
            clear: both;
        }

        #inputBox {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 60%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<h2>🌾 AI农业助手</h2>

<div style="text-align:center;margin-bottom:10px;">
    <button onclick="clearChat()">🧹 清空聊天</button>
</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="question" placeholder="输入问题..." onkeydown="handleKey(event)">
    <button id="sendBtn" onclick="ask()">发送</button>
</div>

<script>

// ✅ 页面加载时恢复历史记录
window.onload = function() {
    let history = localStorage.getItem("chatHistory");
    if (history) {
        document.getElementById("chat").innerHTML = history;
        chat.scrollTop = chat.scrollHeight;
    }
};

async function ask() {
    let q = document.getElementById("question").value;
    let chat = document.getElementById("chat");
    let btn = document.getElementById("sendBtn");

    if (!q.trim()) return;

    btn.disabled = true;

    // 用户消息
    let userDiv = document.createElement("div");
    userDiv.className = "msg user";
    userDiv.innerText = q;
    chat.appendChild(userDiv);

    // AI消息
    let aiDiv = document.createElement("div");
    aiDiv.className = "msg ai";
    aiDiv.innerText = "🤖 思考中...";
    chat.appendChild(aiDiv);

    document.getElementById("question").value = "";

    let res = await fetch(`/chat_stream?q=${encodeURIComponent(q)}`);
    let reader = res.body.getReader();
    let decoder = new TextDecoder();

    let fullText = "";
    aiDiv.innerHTML = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        let chunk = decoder.decode(value);
        fullText += chunk;

        aiDiv.innerHTML = marked.parse(fullText);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.disabled = false;

    // ✅ 保存历史记录
    localStorage.setItem("chatHistory", chat.innerHTML);
}

// 回车发送
function handleKey(e) {
    if (e.key === "Enter") {
        ask();
    }
}

// 清空聊天（同时清空缓存）
function clearChat() {
    document.getElementById("chat").innerHTML = "";
    localStorage.removeItem("chatHistory");
}

// 自动聚焦
document.getElementById("question").focus();

</script>

</body>
</html>
