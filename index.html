<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI农业助手</title>

<link rel="icon" href="/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f7f7f8;
    margin: 0;
}

h2 {
    text-align: center;
    margin: 20px 0 10px;
}

/* 清空按钮 */
.top-bar {
    text-align: center;
    margin-bottom: 10px;
}

.clear-btn {
    background: #ff4d4f;
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    color: white;
    cursor: pointer;
}

.clear-btn:hover {
    background: #d9363e;
}

/* 聊天区域 */
#chat {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    padding-bottom: 140px;
    box-sizing: border-box;
}

/* 气泡 */
.msg {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 16px;
    max-width: fit-content;
    word-break: break-word;
    line-height: 1.5;
}

.user {
    background: #007bff;
    color: white;
    margin-left: auto;
}

.ai {
    background: white;
    border: 1px solid #eee;
}

/* 输入区域 */
#inputBox {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    border-top: 1px solid #ddd;
    padding: 10px 0;
}

/* 输入容器 */
.input-inner {
    max-width: 800px;
    margin: auto;
    display: flex;
    gap: 10px;
    padding: 0 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #10a37f;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0e8c6d;
}
</style>
</head>

<body>

<h2>🌾 AI农业助手</h2>

<div class="top-bar">
    <button class="clear-btn" onclick="clearChat()">🧹 清空聊天</button>
</div>

<div id="chat"></div>

<div id="inputBox">
    <div class="input-inner">
        <input id="question" placeholder="输入问题..." onkeydown="handleKey(event)">
        <button onclick="ask()">发送</button>
    </div>
</div>

<script>
window.onload = () => {
    const history = localStorage.getItem("chatHistory");
    if (history) {
        document.getElementById("chat").innerHTML = history;
    }
};

async function ask() {
    let q = document.getElementById("question").value;
    let chat = document.getElementById("chat");

    if (!q.trim()) return;

    let userDiv = document.createElement("div");
    userDiv.className = "msg user";
    userDiv.innerText = q;
    chat.appendChild(userDiv);

    let aiDiv = document.createElement("div");
    aiDiv.className = "msg ai";
    chat.appendChild(aiDiv);

    document.getElementById("question").value = "";

    let res = await fetch(`/chat_stream?q=${encodeURIComponent(q)}`);
    let reader = res.body.getReader();
    let decoder = new TextDecoder();

    let fullText = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        let chunk = decoder.decode(value);
        fullText += chunk;

        aiDiv.innerHTML = marked.parse(fullText);
        window.scrollTo(0, document.body.scrollHeight);
    }

    setTimeout(() => {
        localStorage.setItem("chatHistory", chat.innerHTML);
    }, 300);
}

function handleKey(e) {
    if (e.key === "Enter") ask();
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
    localStorage.removeItem("chatHistory");
}
</script>

</body>
</html>
