<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI农业助手</title>

    <!-- favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        #chat {
            max-width: 700px;
            margin: auto;
            padding: 10px;
            margin-bottom: 100px;
        }

        .msg {
            margin: 10px;
            padding: 12px;
            border-radius: 15px;
            max-width: 80%;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .user {
            background: #007bff;
            color: white;
            float: right;
            clear: both;
        }
        
        .ai {
            background: white;
            float: left;
            clear: both;
        }
        
        #inputBox {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        input {
            width: 60%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #218838;
        }
    </style>

</head>

<body>

<h2>🌾 AI农业助手</h2>

<div style="text-align:center;margin-bottom:10px;">
    <button onclick="clearChat()">🧹 清空聊天</button>
</div>

    
<div id="chat"></div>

<div id="inputBox">
    <input id="question" placeholder="输入问题..." onkeydown="handleKey(event)">
    <button onclick="ask()">发送</button>
</div>

<script>
async function ask() {
    let q = document.getElementById("question").value;
    let chat = document.getElementById("chat");

    if (!q) return;

    // 👉 用户消息
    let userDiv = document.createElement("div");
    userDiv.className = "msg user";
    userDiv.innerText = q;
    chat.appendChild(userDiv);

    // 👉 AI消息框
    let aiDiv = document.createElement("div");
    aiDiv.className = "msg ai";
    aiDiv.innerText = "🤖 思考中...";
    chat.appendChild(aiDiv);

    document.getElementById("question").value = "";

    // 👉 请求流式接口
    let res = await fetch(`/chat_stream?q=${encodeURIComponent(q)}`);
    let reader = res.body.getReader();
    let decoder = new TextDecoder();

    let fullText = "";
    aiDiv.innerHTML = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        let chunk = decoder.decode(value);
        fullText += chunk;

        // 👉 Markdown 渲染
        aiDiv.innerHTML = marked.parse(fullText);

        // 👉 自动滚动
        window.scrollTo(0, document.body.scrollHeight);
    }
}

function handleKey(e) {
    if (e.key === "Enter") {
        ask();
    }
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
}
    
document.getElementById("question").focus();

</script>

</body>
</html>
