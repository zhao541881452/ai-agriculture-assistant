<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI农业助手</title>
</head>
<body>

<h2>AI农业助手 🌾</h2>

<input id="question" placeholder="输入问题" style="width:300px;">
<button onclick="ask()">提问</button>

<pre id="answer"></pre>

<script>
async function ask() {
    let q = document.getElementById("question").value;

    let res = await fetch(`http://127.0.0.1:8000/chat_stream?q=${encodeURIComponent(q)}`);

    let reader = res.body.getReader();
    let decoder = new TextDecoder();

    let answerBox = document.getElementById("answer");
    answerBox.innerText = "";  // 🔥 清空

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        let chunk = decoder.decode(value, { stream: true });

        answerBox.innerText += chunk;  // 🔥 累加
    }
}

</script>


</body>
</html>
